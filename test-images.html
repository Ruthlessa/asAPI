<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片加载测试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-case { margin: 20px 0; padding: 20px; border: 1px solid #ddd; }
        .success { border-color: green; background-color: #d4edda; }
        .failure { border-color: red; background-color: #f8d7da; }
        img { max-width: 300px; margin: 10px 0; }
        .bg-test { width: 300px; height: 200px; background-size: cover; background-position: center; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>图片加载测试</h1>
    
    <h2>测试 1: 使用 p.2x.nz API</h2>
    <div class="test-case">
        <h3>横向图片</h3>
        <img src="https://p.2x.nz/api/ide/v1/text_to_image?prompt=mountain&image_size=landscape_16_9" onload="this.parentElement.classList.add('success')" onerror="this.parentElement.classList.add('failure')">
        
        <h3>方形图片</h3>
        <img src="https://p.2x.nz/api/ide/v1/text_to_image?prompt=test&image_size=square" onload="this.parentElement.classList.add('success')" onerror="this.parentElement.classList.add('failure')">
        
        <h3>背景图片</h3>
        <div class="bg-test" style="background-image: url('https://p.2x.nz/api/ide/v1/text_to_image?prompt=forest&image_size=landscape_16_9');"></div>
    </div>
    
    <h2>测试 2: 使用其他图片服务（对照）</h2>
    <div class="test-case">
        <h3>占位符图片</h3>
        <img src="https://via.placeholder.com/300x200" onload="this.parentElement.classList.add('success')" onerror="this.parentElement.classList.add('failure')">
        
        <h3>随机猫图片</h3>
        <img src="https://placekitten.com/300/200" onload="this.parentElement.classList.add('success')" onerror="this.parentElement.classList.add('failure')">
    </div>
    
    <h2>测试结果</h2>
    <div id="results">
        <p>请查看上方测试案例的加载状态。</p>
        <p>如果 p.2x.nz 的图片加载失败，但其他图片服务成功，则说明 API 端点可能存在问题。</p>
    </div>
    
    <script>
        // 页面加载完成后检查
        window.onload = function() {
            const testCases = document.querySelectorAll('.test-case');
            testCases.forEach((testCase, index) => {
                const images = testCase.querySelectorAll('img');
                let allLoaded = true;
                
                images.forEach(img => {
                    if (!img.complete || img.naturalHeight === 0) {
                        allLoaded = false;
                    }
                });
                
                if (allLoaded) {
                    testCase.classList.add('success');
                } else {
                    testCase.classList.add('failure');
                }
            });
        };
    </script>
</body>
</html>
