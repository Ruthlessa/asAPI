<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test</title>
</head>
<body>
    <h1>API 测试页面</h1>
    
    <h2>测试图片 API</h2>
    <p>点击按钮测试 API 端点是否正常工作：</p>
    
    <button onclick="testApi()">测试 API</button>
    
    <div id="result" style="margin-top: 20px;"></div>
    
    <script>
        function testApi() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>测试中...</p>';
            
            // 测试 API 端点
            const apiUrl = 'https://p.2x.nz/api/ide/v1/text_to_image?prompt=test&image_size=square';
            
            const img = new Image();
            img.src = apiUrl;
            
            img.onload = function() {
                resultDiv.innerHTML = `
                    <p>✅ API 测试成功！</p>
                    <img src="${apiUrl}" style="max-width: 300px; margin-top: 10px;">
                    <p>URL: <code>${apiUrl}</code></p>
                `;
            };
            
            img.onerror = function() {
                resultDiv.innerHTML = `
                    <p>❌ API 测试失败！</p>
                    <p>URL: <code>${apiUrl}</code></p>
                    <p>可能的原因：</p>
                    <ul>
                        <li>API 端点不可访问</li>
                        <li>网络连接问题</li>
                        <li>API 密钥缺失</li>
                    </ul>
                `;
            };
        }
        
        // 页面加载时自动测试
        window.onload = testApi;
    </script>
</body>
</html>
